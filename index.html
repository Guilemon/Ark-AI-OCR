<!DOCTYPE html>
<html>
<head>
  <title>AI Document Processor</title>
  <style>
    * { margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial; 
           background: #f5f5f5; padding: 40px 20px; }
    .container { max-width: 600px; margin: 0 auto; 
                 background: white; padding: 40px; border-radius: 8px; 
                 box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h1 { color: #222; margin-bottom: 10px; }
    p { color: #666; line-height: 1.6; margin-bottom: 20px; }
    .cta { background: #0066cc; color: white; padding: 12px 24px; 
           border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
    .cta:hover { background: #0052a3; }
    .status { color: #0066cc; font-weight: bold; }
  </style>
</head>
<body>
  <div class="container">
    <h1>AI Document Processor</h1>
    <p>Extract structured data from documents in seconds. No manual data entry. No errors.</p>
    <p><strong>For:</strong> Finance teams, HR departments, law firms, insurance companies.</p>
    <p><strong>Status:</strong> <span class="status">Beta launch May 28, 2026</span></p>
    
    <form action="https://formspree.io/f/xojbpbkz" method="POST">
      <input type="email" name="email" placeholder="your@email.com" required 
             style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 4px;">
      <button type="submit" class="cta">Get early access</button>
    </form>
    
    <p style="margin-top: 20px; font-size: 12px; color: #999;">
      Updates: <a href="https://github.com/Guilemon/Ark-AI-OCR/" target="_blank">GitHub</a>
    </p>
  </div>
</body>
</html>
